{% extends "courrier/base.html" %}

{% block content %}
    <h2>Connexion</h2>

    {% if form.errors %}
        <p style="color: red;">
            Nom d'utilisateur ou mot de passe incorrect.
        </p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label for="{{ form.username.id_for_label }}">Nom d'utilisateur</label><br>
            {{ form.username }}
        </p>

        <p>
            <label for="{{ form.password.id_for_label }}" >Mot de passe</label><br>
            {{ form.password }}
        </p>

        {% if next %}
            <input type="hidden" name="next" value="{{ next }}" >
        {% endif %}

        <button type="submit">Se connecter</button>
    </form>
{% endblock %}
